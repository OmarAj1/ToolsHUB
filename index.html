<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolHub</title>
    <script defer data-domain="tools.example.com" src="https://plausible.io/js/script.js"></script>
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8230840732478158" crossorigin="anonymous"></script> -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
      /* Hide the Google Translate top bar */
      .skiptranslate iframe { display: none !important; }
      body { top: 0px !important; }
      /* Style the widget */
      .goog-te-gadget-simple {
        background-color: transparent !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 8px !important;
        padding: 4px 8px !important;
        font-family: inherit !important;
        font-size: 14px !important;
        display: flex !important;
        align-items: center !important;
        gap: 4px !important;
      }
      .dark .goog-te-gadget-simple {
        border-color: #334155 !important;
        background-color: #0f172a !important;
      }
      .goog-te-gadget-simple .goog-te-menu-value {
        color: inherit !important;
      }
      .goog-te-logo { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
